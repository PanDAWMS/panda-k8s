# Default values for idds.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

rest:
  replicaCount: 1
  iddsServer: panda-idds-tb.cern.ch
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 6Gi
  persistentvolume:
    create: false
    class: manila-meyrin-cephfs-b
    selector: false
    size: 50Gi
  persistentvolumerequests:
    create: false
    class: manila-meyrin-cephfs-b
    selector: false
    size: 10Gi

  ingress:
    enabled: true
    hosts:
      - domain: cern.ch
        hostOverride: panda-idds-tb.cern.ch
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: "default"
        hosts:
          - domain: cern.ch
            hostOverride: panda-idds-tb.cern.ch

postgres:
  enabled: false
