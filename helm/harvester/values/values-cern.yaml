# Default values for harvester - DOMA overrides.
# This is a YAML-formatted file.

harvester:
  experiment: doma

  persistentvolume:
    create: false
    class: manila-meyrin-cephfs
    existingClaim: panda-shared-logs
    subPath: harvester-logs
    selector: false
    size: 50Gi
  persistentvolumewdir:
    selector: false
    size: 50Gi
  persistentvolumecondor:
    create: false
    existingClaim: panda-shared-logs
    subPath: condor_logs
    selector: false
  sharedLogs:
    create: true
    name: panda-shared-logs
    size: 200Gi
    storageClass: manila-meyrin-cephfs

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: server
            topologyKey: kubernetes.io/hostname
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: jedi
            topologyKey: kubernetes.io/hostname
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: rest
            topologyKey: kubernetes.io/hostname
  tolerations:
    - key: "node.kubernetes.io/not-ready"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
    - key: "node.kubernetes.io/unreachable"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi

mariadb:
  podSecurityContext:
    fsGroup: 1001

  persistentvolume:
    create: false
    selector: false
    existingClaim: panda-shared-logs
    subPath: mariadb-data

  resources:
    requests:
      cpu: "250m"
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
