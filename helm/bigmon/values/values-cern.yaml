# Default values for bigmon.
# # This is a YAML-formatted file.
# # Declare variables to be passed into your templates.
#

main:
  image:
    tag: "v1.1.7"
  tolerations:
    - key: "node.kubernetes.io/not-ready"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
    - key: "node.kubernetes.io/unreachable"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
  persistentvolume:
    create: false
    sharedPvcName: panda-shared-logs
    subPath: bigmon-logs
    size: 50Gi

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 6Gi

  ingress:
    enabled: true
    hosts:
      - domain: cern.ch
        hostOverride: panda-doma.cern.ch
        paths:
          - path: /condor_logs
            pathType: Prefix
            serviceName: panda-harvester
            servicePort: 443
          - path: /
            pathType: Prefix
    tls:
      - secretName: "default"
        hosts:
          - domain: cern.ch
            hostOverride: panda-doma.cern.ch
