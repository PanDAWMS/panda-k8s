# Default values for panda.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

server:
  image:
    tag: "1.0.2"
  tolerations:
    - key: "node.kubernetes.io/not-ready"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
    - key: "node.kubernetes.io/unreachable"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: jedi
            topologyKey: kubernetes.io/hostname
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: harvester
            topologyKey: kubernetes.io/hostname
        - weight: 80
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: main
            topologyKey: kubernetes.io/hostname
        - weight: 80
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: rest
            topologyKey: kubernetes.io/hostname
  # use Route class for ingress
  route:
    enabled: false
  ingress:
    enabled: true
    hosts:
      - domain: cern.ch
        hostOverride: pandaserver-doma.cern.ch
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: default
        hosts:
          - domain: cern.ch
            hostOverride: pandaserver-doma.cern.ch
  persistentvolume:
    create: false
    selector: false
    size: 50Gi
    sharedPvcName: panda-shared-logs
    subPath: server-logs
  configFile: "panda_server_config.cern.json"
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi

jedi:
  image:
    tag: "1.0.2"
  tolerations:
    - key: "node.kubernetes.io/not-ready"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
    - key: "node.kubernetes.io/unreachable"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: server
            topologyKey: kubernetes.io/hostname
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: harvester
            topologyKey: kubernetes.io/hostname
  persistentvolume:
    create: false
    selector: false
    size: 50Gi
    sharedPvcName: panda-shared-logs
    subPath: jedi-logs
  configFile: "panda_jedi_config.cern.json"
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi

postgres:
  enabled: false
