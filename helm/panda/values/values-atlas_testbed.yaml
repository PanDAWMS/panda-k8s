# Default values for panda.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

server:
  configFile: panda_server_config.atlas_testbed.json
  tolerations:
    - key: "node.kubernetes.io/not-ready"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
    - key: "node.kubernetes.io/unreachable"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "6"
      memory: 8Gi
  persistentvolume:
    create: false
    class: manila-meyrin-cephfs
    selector: false
    size: 50Gi
  # use Route class for ingress
  route:
    enabled: false
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    hosts:
      - domain: cern.ch
        hostOverride: pandaserver-tb.cern.ch
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: default
        hosts:
          - domain: cern.ch
            hostOverride: pandaserver-tb.cern.ch

jedi:
  configFile: panda_jedi_config.atlas_testbed.json
  tolerations:
    - key: "node.kubernetes.io/not-ready"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
    - key: "node.kubernetes.io/unreachable"
      operator: "Exists"
      effect: "NoExecute"
      tolerationSeconds: 30
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "6"
      memory: 8Gi
  persistentvolume:
    create: false
    class: manila-meyrin-cephfs
    selector: false
    size: 50Gi

postgres:
    enabled: false

    persistentvolume:
      create: false
